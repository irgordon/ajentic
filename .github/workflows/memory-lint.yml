name: memory-lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  memory-lint:
    name: Memory Placement Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate memory placement
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d memory ]; then
            echo "memory/ not present; memory placement checks passed."
            exit 0
          fi

          if find memory -type f -name "*.md" -print -quit | grep -q .; then
            echo "::error::memory/ must not contain Markdown documentation"
            find memory -type f -name "*.md" -print
            exit 1
          fi

          if find memory -type f -name "*.schema.json" -print -quit | grep -q .; then
            echo "::error::memory/ must not contain schemas"
            find memory -type f -name "*.schema.json" -print
            exit 1
          fi

          if [ -d memory/ephemeral ]; then
            if find memory/ephemeral -type f ! -name ".gitignore" -print -quit | grep -q .; then
              echo "::error::ephemeral memory files must not be committed"
              find memory/ephemeral -type f ! -name ".gitignore" -print
              exit 1
            fi
          fi

          if find memory -type f -name "*.json" -print -quit | grep -q .; then
            find memory -type f -name "*.json" -print0 |
              xargs -0 -n1 python3 -m json.tool > /dev/null
          fi

          if find memory -type f \
            ! -name ".gitignore" \
            ! -name "*.json" \
            -print -quit | grep -q .; then
            echo "::error::memory/ may contain only JSON data files and .gitignore placeholders"
            find memory -type f \
              ! -name ".gitignore" \
              ! -name "*.json" \
              -print
            exit 1
          fi

          echo "Memory placement checks passed."
