name: docs-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  docs-gate:
    name: Documentation Truth-Dimension Gate
    runs-on: ubuntu-latest
    if: ${{ hashFiles('docs/**/*.md') != '' || hashFiles('*.md') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate documentation boundaries
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import sys

          failures = []

          def fail(message: str) -> None:
              failures.append(message)

          def is_git_path(path: Path) -> bool:
              return ".git" in path.parts

          def read_text(path: Path) -> str:
              return path.read_text(encoding="utf-8", errors="strict")

          def parse_frontmatter(path: Path) -> dict:
              lines = read_text(path).splitlines()
              if not lines or lines[0].strip() != "---":
                  return {}
              data = {}
              for line in lines[1:]:
                  if line.strip() == "---":
                      return data
                  if ":" in line:
                      key, value = line.split(":", 1)
                      data[key.strip()] = value.strip().strip('"').strip("'")
              return data

          markdown_files = [p for p in Path(".").rglob("*.md") if not is_git_path(p)]

          for path in markdown_files:
              fm = parse_frontmatter(path)
              text = read_text(path).lower()

              if path.as_posix() == "CHANGELOG.md":
                  if "future plan" in text or "planned next" in text:
                      fail(f"{path}: changelog must not contain future planning language")

              if path.as_posix().startswith("docs/roadmap/"):
                  if "completed" in text and "exit criteria" not in text:
                      fail(f"{path}: roadmap should not record completed work")

              if path.as_posix().startswith("memory/"):
                  fail(f"{path}: Markdown documentation must not live in memory/")

              if path.as_posix().startswith("docs/examples/"):
                  if fm.get("authority_level") == "authoritative":
                      fail(f"{path}: examples must not be authoritative")

              if path.as_posix() == "README.md":
                  if fm.get("authority_level") == "authoritative":
                      fail(f"{path}: README must not be authoritative")

              if path.as_posix() == "AGENTS.md":
                  if fm.get("authority_level") == "authoritative":
                      fail(f"{path}: AGENTS.md must not be authoritative")

          if failures:
              for message in failures:
                  print(f"::error::{message}")
              sys.exit(1)

          print("Documentation boundary checks passed.")
          PY
