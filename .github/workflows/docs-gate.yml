name: docs-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  docs-gate:
    name: Documentation Truth-Dimension Gate
    runs-on: ubuntu-latest
    if: ${{ hashFiles('docs/**/*.md') != '' || hashFiles('*.md') != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate documentation boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_docs.py
